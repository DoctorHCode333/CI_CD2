###
# This GitHub action exports HarshTestFlow from DEV environment (usw2)
# and deploys it to TEST environment (use1) via Terraform Cloud remote backend.
#
# Pipeline Flow:
#  1. export-flow-from-dev: Export HarshTestFlow from DEV (us-west-2)
#     - Creates genesyscloud.tf with all flows and dependencies in blueprint/genesys-cloud-cx-as-code/deploy/
#     - Commits all exported resources to GitHub
#  2. deploy-to-test: Deploy to TEST (us-east-1) using Terraform Cloud
#     - Uses deploy/genesyscloud.tf (resources) + deploy/main.tf (backend config)
#     - Deploys via genesys-cloud-apply-terraform action from deploy directory
#
# Environment configurations:
#  DEV:  us-west-2 (usw2.pure.cloud)
#  TEST: us-east-1 (mypurecloud.com) - Workspace: CI_CD_TEST
###
name: Deploy Flow from DEV to TEST
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  ###
  #  job: export-flow-from-dev
  #
  #  This job exports HarshTestFlow from DEV environment (us-west-2).
  #  Exports to blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf (flows and dependencies)
  #  and blueprint/genesys-cloud-cx-as-code/deploy/architect_flows/ (YAML files)
  ###
  export-flow-from-dev:
    runs-on: ubuntu-latest
    env:
      FLOW_NAME: "HarshTestFlow"
      GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID_DEV }}
      GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET_DEV }}
      GENESYSCLOUD_API_REGION: "https://api.usw2.pure.cloud"
      GENESYSCLOUD_REGION: "us-west-2"
    steps:
      - uses: actions/checkout@v2
      
      - uses: ./.github/actions/genesys-cloud-dev-tools
      
      - uses: hashicorp/setup-terraform@v1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      - name: List flows in DEV environment
        working-directory: blueprint/genesys-cloud-cx-as-code/export
        run: |
          echo "=== Listing flows in DEV environment (usw2) ==="
          python list-flows.py
        shell: bash
      
      - name: Export HarshTestFlow from DEV
        uses: ./.github/actions/genesys-cloud-export-flows
      
      - name: Clean up exported genesyscloud.tf
        run: |
          echo "=== Cleaning exported genesyscloud.tf ==="
          # Remove terraform block with required_providers to avoid conflict with main.tf
          # The terraform block in main.tf contains the remote backend configuration
          sed -i '/^terraform {/,/^}/d' blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          echo "✓ Terraform block removed"
          
          # Remove file_content_hash attribute (computed attribute, cannot be set manually)
          sed -i '/file_content_hash/d' blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          echo "✓ file_content_hash attribute removed"
          
          # Remove Home division resource (already exists in TEST) and replace with data source
          sed -i '/^resource "genesyscloud_auth_division" "Home" {/,/^}/d' blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          sed -i '1i# Reference existing Home division (already exists in TEST environment)\ndata "genesyscloud_auth_division_home" "Home" {}\n' blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          echo "✓ Home division resource replaced with data source"
          
          # Replace division_id references to use data source
          sed -i 's/\${genesyscloud_auth_division\.Home\.id}/data.genesyscloud_auth_division_home.Home.id/g' blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          echo "✓ Division references updated to use data source"
          echo ""
          echo "First 20 lines of cleaned genesyscloud.tf:"
          head -20 blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
        shell: bash
      
      - name: Verify exported resources
        run: |
          echo "=== Verifying exported resources ==="
          echo "Exported Terraform file (genesyscloud.tf):"
          ls -lh blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf || echo "genesyscloud.tf not found!"
          echo ""
          echo "Exported flow YAML files:"
          ls -lh blueprint/genesys-cloud-cx-as-code/deploy/architect_flows/*.yaml || echo "No YAML files found"
          echo ""
          echo "Contents of deploy directory:"
          ls -la blueprint/genesys-cloud-cx-as-code/deploy/
        shell: bash
      
      - name: Commit all exported resources to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          git add blueprint/genesys-cloud-cx-as-code/deploy/architect_flows/
          git add blueprint/genesys-cloud-cx-as-code/deploy/terraform.tfvars || true
          git diff --staged --quiet || git commit -m "Auto-export HarshTestFlow from DEV (usw2) [skip ci]"
          git push origin main --force
        shell: bash

  ###
  #  job: deploy-to-test
  #
  #  This job deploys HarshTestFlow to TEST environment (us-east-1) via Terraform Cloud.
  #  Uses deploy/genesyscloud.tf (exported flows/dependencies) + deploy/main.tf (backend configuration)
  #  Deploys using the genesys-cloud-apply-terraform action from deploy directory
  ###
  deploy-to-test:
    runs-on: ubuntu-latest
    needs: export-flow-from-dev
    env:
      GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID_TEST }}
      GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET_TEST }}
      GENESYSCLOUD_API_REGION: "https://api.mypurecloud.com"
      GENESYSCLOUD_REGION: "us-east-1"
      TF_WORKSPACE: "_TEST"  # With prefix "CI_CD" in main.tf, workspace CI_CD_TEST appears as "_TEST"
    steps:
      - uses: actions/checkout@v2
        with:
          ref: main  # Get latest commit with exported resources
      
      - uses: ./.github/actions/genesys-cloud-dev-tools
      
      - uses: hashicorp/setup-terraform@v1
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Verify exported resources before deployment
        run: |
          echo "=== Verifying resources for deployment ==="
          echo "main.tf (backend config):"
          ls -lh blueprint/genesys-cloud-cx-as-code/deploy/main.tf
          echo ""
          echo "genesyscloud.tf (flows and dependencies):"
          ls -lh blueprint/genesys-cloud-cx-as-code/deploy/genesyscloud.tf
          echo ""
          echo "Flow YAML files:"
          ls -lh blueprint/genesys-cloud-cx-as-code/deploy/architect_flows/*.yaml || echo "No YAML files found"
        shell: bash
      
      #########################################################################
      # DEBUG: Credential Validation Steps
      # These steps help identify OAuth credential issues before Terraform runs
      #########################################################################
      
      - name: DEBUG - Validate Credential Format
        run: |
          echo "=== DEBUG: Credential Format Validation ==="
          echo ""
          
          # Check if secrets are set
          if [ -z "$GENESYSCLOUD_OAUTHCLIENT_ID" ]; then
            echo "❌ ERROR: GENESYSCLOUD_OAUTHCLIENT_ID is empty or not set!"
            echo "   Check that secret 'GENESYSCLOUD_OAUTHCLIENT_ID_TEST' exists in GitHub"
            exit 1
          fi
          
          if [ -z "$GENESYSCLOUD_OAUTHCLIENT_SECRET" ]; then
            echo "❌ ERROR: GENESYSCLOUD_OAUTHCLIENT_SECRET is empty or not set!"
            echo "   Check that secret 'GENESYSCLOUD_OAUTHCLIENT_SECRET_TEST' exists in GitHub"
            exit 1
          fi
          
          echo "✓ Both credentials are set (not empty)"
          
          # Check Client ID format (UUID format: 8-4-4-4-12)
          CLIENT_ID_LENGTH=${#GENESYSCLOUD_OAUTHCLIENT_ID}
          echo ""
          echo "Client ID Analysis:"
          echo "  - Length: $CLIENT_ID_LENGTH characters"
          echo "  - First 4 chars: ${GENESYSCLOUD_OAUTHCLIENT_ID:0:4}..."
          echo "  - Last 4 chars: ...${GENESYSCLOUD_OAUTHCLIENT_ID: -4}"
          
          # UUID should be 36 characters (32 hex + 4 dashes)
          if [ "$CLIENT_ID_LENGTH" -ne 36 ]; then
            echo "  ⚠️ WARNING: Client ID length is $CLIENT_ID_LENGTH, expected 36 (UUID format)"
            echo "     This may indicate extra whitespace or incorrect format"
          else
            echo "  ✓ Client ID length matches UUID format (36 chars)"
          fi
          
          # Check for common issues: leading/trailing whitespace
          TRIMMED_ID=$(echo "$GENESYSCLOUD_OAUTHCLIENT_ID" | tr -d '[:space:]')
          if [ "$TRIMMED_ID" != "$GENESYSCLOUD_OAUTHCLIENT_ID" ]; then
            echo "  ❌ ERROR: Client ID contains whitespace characters!"
            echo "     Original length: $CLIENT_ID_LENGTH"
            echo "     Trimmed length: ${#TRIMMED_ID}"
            echo "     Please update the GitHub secret to remove whitespace"
          fi
          
          # Check Client Secret format
          SECRET_LENGTH=${#GENESYSCLOUD_OAUTHCLIENT_SECRET}
          echo ""
          echo "Client Secret Analysis:"
          echo "  - Length: $SECRET_LENGTH characters"
          echo "  - First 4 chars: ${GENESYSCLOUD_OAUTHCLIENT_SECRET:0:4}..."
          echo "  - Last 4 chars: ...${GENESYSCLOUD_OAUTHCLIENT_SECRET: -4}"
          
          # Check for common issues: leading/trailing whitespace
          TRIMMED_SECRET=$(echo "$GENESYSCLOUD_OAUTHCLIENT_SECRET" | tr -d '[:space:]')
          if [ "$TRIMMED_SECRET" != "$GENESYSCLOUD_OAUTHCLIENT_SECRET" ]; then
            echo "  ❌ ERROR: Client Secret contains whitespace characters!"
            echo "     Original length: $SECRET_LENGTH"
            echo "     Trimmed length: ${#TRIMMED_SECRET}"
            echo "     Please update the GitHub secret to remove whitespace"
          else
            echo "  ✓ Client Secret has no extra whitespace"
          fi
          
          echo ""
          echo "=== Environment Variables Check ==="
          echo "GENESYSCLOUD_REGION: $GENESYSCLOUD_REGION"
          echo "GENESYSCLOUD_API_REGION: $GENESYSCLOUD_API_REGION"
          echo "TF_WORKSPACE: $TF_WORKSPACE"
        shell: bash
      
      - name: DEBUG - Test OAuth Authentication Directly
        run: |
          echo "=== DEBUG: Testing OAuth Authentication with Genesys Cloud API ==="
          echo ""
          echo "Target: $GENESYSCLOUD_API_REGION (TEST environment)"
          echo ""
          
          # Build the login URL
          LOGIN_URL="${GENESYSCLOUD_API_REGION/api/login}"
          echo "Login URL: $LOGIN_URL/oauth/token"
          echo ""
          
          # Attempt OAuth token request
          echo "Attempting OAuth client credentials authentication..."
          echo ""
          
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$LOGIN_URL/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -u "$GENESYSCLOUD_OAUTHCLIENT_ID:$GENESYSCLOUD_OAUTHCLIENT_SECRET" \
            2>&1)
          
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
          
          echo "HTTP Response Code: $HTTP_CODE"
          echo ""
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ SUCCESS: OAuth authentication successful!"
            echo "   Credentials are valid for TEST environment"
            # Don't print the token, just confirm it was received
            if echo "$HTTP_BODY" | grep -q "access_token"; then
              echo "   Access token received successfully"
            fi
          else
            echo "❌ FAILED: OAuth authentication failed!"
            echo ""
            echo "Response body:"
            echo "$HTTP_BODY" | jq . 2>/dev/null || echo "$HTTP_BODY"
            echo ""
            echo "=== Diagnostic Information ==="
            echo ""
            
            if [ "$HTTP_CODE" = "400" ]; then
              echo "HTTP 400 - Bad Request / Invalid Client"
              echo ""
              echo "Possible causes:"
              echo "  1. Client ID is incorrect or doesn't exist in TEST org"
              echo "  2. Client Secret is incorrect"
              echo "  3. OAuth client is disabled in Genesys Cloud"
              echo "  4. OAuth client was created in different region"
              echo "  5. Credentials have extra whitespace or special characters"
              echo ""
              echo "Recommended actions:"
              echo "  1. Log into Genesys Cloud TEST (us-east-1 / mypurecloud.com)"
              echo "  2. Go to Admin > Integrations > OAuth"
              echo "  3. Verify the OAuth client exists and is enabled"
              echo "  4. Regenerate the client secret if needed"
              echo "  5. Update GitHub secrets with correct values (no extra spaces)"
            elif [ "$HTTP_CODE" = "401" ]; then
              echo "HTTP 401 - Unauthorized"
              echo "The client secret appears to be incorrect"
            elif [ "$HTTP_CODE" = "403" ]; then
              echo "HTTP 403 - Forbidden"
              echo "The OAuth client may not have the required permissions"
            else
              echo "Unexpected HTTP code: $HTTP_CODE"
            fi
            
            echo ""
            echo "=== Quick Verification Steps ==="
            echo "1. GitHub Secret Name: GENESYSCLOUD_OAUTHCLIENT_ID_TEST"
            echo "   - Should contain the Client ID (UUID format)"
            echo ""
            echo "2. GitHub Secret Name: GENESYSCLOUD_OAUTHCLIENT_SECRET_TEST"  
            echo "   - Should contain the Client Secret"
            echo ""
            echo "3. Verify the OAuth client in Genesys Cloud:"
            echo "   - Region: us-east-1 (mypurecloud.com)"
            echo "   - Grant Type: Client Credentials"
            echo "   - Status: Enabled"
            echo ""
            # Don't exit here - let it continue to Terraform for full error details
          fi
        shell: bash
      
      - name: DEBUG - Check Terraform Cloud Workspace Variables
        run: |
          echo "=== DEBUG: Terraform Cloud Configuration Check ==="
          echo ""
          echo "⚠️ IMPORTANT: Terraform Cloud workspace variables can OVERRIDE GitHub secrets!"
          echo ""
          echo "Current GitHub Actions environment:"
          echo "  GENESYSCLOUD_OAUTHCLIENT_ID: (set from GENESYSCLOUD_OAUTHCLIENT_ID_TEST secret)"
          echo "  GENESYSCLOUD_OAUTHCLIENT_SECRET: (set from GENESYSCLOUD_OAUTHCLIENT_SECRET_TEST secret)"
          echo "  GENESYSCLOUD_REGION: $GENESYSCLOUD_REGION"
          echo "  GENESYSCLOUD_API_REGION: $GENESYSCLOUD_API_REGION"
          echo ""
          echo "Terraform Cloud workspace: CI_CD_TEST"
          echo ""
          echo "Please check Terraform Cloud (app.terraform.io) for:"
          echo "  1. Organization: TestCognizant"
          echo "  2. Workspace: CI_CD_TEST"
          echo "  3. Settings > Variables"
          echo ""
          echo "If ANY of these variables are set in Terraform Cloud workspace:"
          echo "  - GENESYSCLOUD_OAUTHCLIENT_ID"
          echo "  - GENESYSCLOUD_OAUTHCLIENT_SECRET"
          echo "  - GENESYSCLOUD_REGION"
          echo "  - GENESYSCLOUD_API_REGION"
          echo ""
          echo "They will OVERRIDE the values from GitHub secrets!"
          echo ""
          echo "To fix: Either update Terraform Cloud workspace variables,"
          echo "        or remove them to use GitHub secrets instead."
        shell: bash
      
      - name: Confirm TEST Region Configuration
        run: |
          echo "=== Confirming TEST Environment Region ==="
          echo "✓ GENESYSCLOUD_REGION: $GENESYSCLOUD_REGION"
          echo "✓ GENESYSCLOUD_API_REGION: $GENESYSCLOUD_API_REGION"
          echo "✓ Terraform Workspace: $TF_WORKSPACE"
          echo ""
          if [ "$GENESYSCLOUD_REGION" != "us-east-1" ]; then
            echo "❌ ERROR: Wrong region! Expected us-east-1 (TEST), got $GENESYSCLOUD_REGION"
            exit 1
          fi
          if [ "$GENESYSCLOUD_API_REGION" != "https://api.mypurecloud.com" ]; then
            echo "❌ ERROR: Wrong API region! Expected https://api.mypurecloud.com (TEST), got $GENESYSCLOUD_API_REGION"
            exit 1
          fi
          echo "✅ Confirmed: Deploying to TEST environment (us-east-1)"
          echo "✅ NOT deploying to DEV environment (us-west-2)"
        shell: bash
      
      - name: Verify Terraform Cloud Configuration
        working-directory: blueprint/genesys-cloud-cx-as-code/deploy
        run: |
          echo "=== Verifying Terraform Cloud Configuration ==="
          echo "TF_WORKSPACE environment variable: $TF_WORKSPACE"
          echo "Expected Terraform Cloud workspace: CI_CD_TEST (local name: _TEST)"
          echo ""
          echo "✅ Configuration looks correct"
          echo "✅ Deployment will use CI_CD_TEST workspace in Terraform Cloud"
        shell: bash
      
      - name: Deploy to TEST using Terraform Cloud
        uses: ./.github/actions/genesys-cloud-apply-terraform
      
      - name: Deployment Summary
        if: success()
        run: |
          echo "## Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Flow:** HarshTestFlow" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** DEV (us-west-2)" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** TEST (us-east-1)" >> $GITHUB_STEP_SUMMARY
          echo "**Terraform Workspace:** CI_CD_TEST" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- deploy/main.tf (Terraform Cloud backend configuration)" >> $GITHUB_STEP_SUMMARY
          echo "- deploy/genesyscloud.tf (Exported flows and dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "- deploy/architect_flows/*.yaml (Flow definitions)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Check Terraform Cloud workspace: CI_CD_TEST" >> $GITHUB_STEP_SUMMARY
          echo "2. Login to Genesys Cloud TEST org (us-east-1)" >> $GITHUB_STEP_SUMMARY
          echo "3. Navigate to Admin > Architect > Flows" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify HarshTestFlow exists and is configured correctly" >> $GITHUB_STEP_SUMMARY
        shell: bash
